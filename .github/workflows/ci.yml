name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Ruff lint
        run: ruff check .

  test:
    name: test (py${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.13"]  # declared floor (requires-python >=3.9) + current
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Run pytest (when a tests/ directory exists)
        if: hashFiles('tests/**/*.py') != ''
        run: |
          python -m pip install pytest
          pytest -q
      - name: CLI smoke test — split a generated 5-page PDF
        shell: python
        run: |
          import pathlib, subprocess, sys
          from pypdf import PdfReader, PdfWriter

          w = PdfWriter()
          for _ in range(5):
              w.add_blank_page(width=200, height=200)
          with open("sample.pdf", "wb") as f:
              w.write(f)

          subprocess.run(
              [sys.executable, "-m", "pdfsplit.cli", "sample.pdf", "1-3", "3", "--out", "out"],
              check=True,
          )
          names = sorted(p.name for p in pathlib.Path("out").iterdir())
          assert names == ["sample_pages_1-3.pdf", "sample_pages_3.pdf"], names
          assert len(PdfReader("out/sample_pages_1-3.pdf").pages) == 3
          assert len(PdfReader("out/sample_pages_3.pdf").pages) == 1

          # invalid range must fail with a clean error, not a traceback
          r = subprocess.run(
              [sys.executable, "-m", "pdfsplit.cli", "sample.pdf", "4-99"],
              capture_output=True, text=True,
          )
          assert r.returncode == 1 and "Error:" in r.stderr, (r.returncode, r.stderr)
          print("smoke test OK")
