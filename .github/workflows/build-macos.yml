name: Build macOS app

# Builds PDFSplitter.app on a real macOS runner (PyInstaller can't cross-compile,
# so the Mac app must be built on macOS).
#
#   * Every push to main -> build and upload the app as a downloadable artifact.
#   * Push a tag like v1.0.0 -> also attach the app to a GitHub Release,
#     giving your coworker a permanent download link.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyinstaller pypdf

      - name: Make icon.icns from icon.png
        run: |
          mkdir -p icon.iconset
          sips -z 16 16     assets/icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     assets/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     assets/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   assets/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   assets/icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   assets/icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   assets/icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 assets/icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o assets/icon.icns

      - name: Build the .app
        run: >
          pyinstaller --noconfirm --clean --windowed
          --icon assets/icon.icns
          --name PDFSplitter run_gui.pyw

      - name: Zip the .app (ditto preserves the bundle)
        run: ditto -c -k --keepParent dist/PDFSplitter.app dist/PDFSplitter-macos.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFSplitter-macos
          path: dist/PDFSplitter-macos.zip

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PDFSplitter-macos.zip
